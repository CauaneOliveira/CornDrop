name: CornDrop CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

jobs:

# =========================
# CI - TESTES
# =========================
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: corndrop
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build + Testes
        run: mvn clean verify
        working-directory: backend

# =========================
# CD - BUILD + PUSH
# =========================
  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir versão
        id: vars
        run: |
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build imagem
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/corndrop-backend:latest ./backend
          docker build -t ${{ secrets.DOCKER_USER }}/corndrop-backend:${{ env.SHA_SHORT }} ./backend

      - name: Push imagens
        run: |
          docker push ${{ secrets.DOCKER_USER }}/corndrop-backend:latest
          docker push ${{ secrets.DOCKER_USER }}/corndrop-backend:${{ env.SHA_SHORT }}          