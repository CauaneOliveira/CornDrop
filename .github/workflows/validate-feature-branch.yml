name: Validate Feature Branch

on:
  pull_request:
    branches:
      - dev

jobs:
  validate-feature-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate feature branch
        run: |
          BRANCH="${{ github.head_ref }}"

          if [[ "$BRANCH" =~ ^feature\/HU-[0-9]+\/[a-z0-9-]+$ ]]; then
            echo "Feature branch válida"
          else
            echo "Feature branch inválida"
            echo ""
            echo "Exemplo:"
            echo "feature/HU-123/nova-funcionalidade"
            exit 1
          fi