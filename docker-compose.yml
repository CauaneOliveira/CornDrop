services:
  postgres:
    image: postgres:15
    container_name: corndrop_db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
    container_name: corndrop_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
    container_name: corndrop_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: